<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRAE Work Skins</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0e0e12;
      color: #e8e8f0;
      overflow-y: auto;
      overflow-x: hidden;
    }

    body::-webkit-scrollbar {
      width: 4px;
    }
    body::-webkit-scrollbar-track {
      background: transparent;
    }
    body::-webkit-scrollbar-thumb {
      background: rgba(120, 100, 255, 0.25);
      border-radius: 2px;
    }

    /* 顶部品牌区 */
    .header {
      padding: 20px 22px 16px;
      background: linear-gradient(135deg, #14141c 0%, #0e0e12 100%);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -30px;
      right: -30px;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(120, 100, 255, 0.15), transparent 70%);
      pointer-events: none;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #7864ff, #b45cff);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      color: #fff;
      flex-shrink: 0;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 11px;
      color: #6a6a80;
      margin-left: 38px;
      letter-spacing: 0.2px;
    }

    /* 主题列表 */
    .theme-list {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .theme-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .theme-card:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.1);
      transform: translateY(-1px);
    }

    .theme-card.active {
      border-color: rgba(120, 100, 255, 0.5);
      background: rgba(120, 100, 255, 0.06);
    }

    .theme-card.active::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at left, rgba(120, 100, 255, 0.06), transparent 70%);
      pointer-events: none;
    }

    /* 主题色预览条 */
    .theme-preview {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      flex-shrink: 0;
      position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .theme-info {
      flex: 1;
      min-width: 0;
    }

    .theme-name {
      font-size: 13.5px;
      font-weight: 500;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .theme-desc {
      font-size: 10.5px;
      color: #6a6a80;
      letter-spacing: 0.1px;
    }

    /* 选中对勾 */
    .check-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .theme-card.active .check-icon {
      background: linear-gradient(135deg, #7864ff, #b45cff);
      border-color: transparent;
    }

    .check-icon svg {
      width: 11px;
      height: 11px;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .theme-card.active .check-icon svg {
      opacity: 1;
    }

    /* 默认主题卡片特殊处理 */
    .theme-card[data-theme="default"] .theme-preview {
      background: #f5f5f5;
      border: 1px solid rgba(0,0,0,0.08);
    }

    /* 各主题预览渐变 */
    .theme-card[data-theme="cyberpunk"] .theme-preview {
      background: linear-gradient(135deg, #0a0a0f, #12121a);
      box-shadow: inset 0 0 0 1px rgba(0, 240, 255, 0.2);
    }
    .theme-card[data-theme="cyberpunk"] .theme-preview::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: linear-gradient(90deg, rgba(0, 240, 255, 0.3), rgba(255, 0, 170, 0.3));
      opacity: 0.6;
    }

    .theme-card[data-theme="forest"] .theme-preview {
      background: linear-gradient(135deg, #0f1a12, #162019);
      box-shadow: inset 0 0 0 1px rgba(74, 222, 128, 0.2);
    }
    .theme-card[data-theme="forest"] .theme-preview::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px rgba(74, 222, 128, 0.5);
    }

    .theme-card[data-theme="sunset"] .theme-preview {
      background: linear-gradient(135deg, #1a0e0a, #241410);
      box-shadow: inset 0 0 0 1px rgba(255, 107, 53, 0.2);
    }
    .theme-card[data-theme="sunset"] .theme-preview::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(245, 158, 11, 0.2), rgba(255, 107, 53, 0.15));
    }

    .theme-card[data-theme="midnight"] .theme-preview {
      background: linear-gradient(135deg, #0c0a14, #14111f);
      box-shadow: inset 0 0 0 1px rgba(167, 139, 250, 0.2);
    }
    .theme-card[data-theme="midnight"] .theme-preview::after {
      content: '';
      position: absolute;
      top: 6px;
      right: 8px;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #a78bfa;
      box-shadow:
        0 0 4px rgba(167, 139, 250, 0.6),
        -8px 4px 0 1px rgba(244, 114, 182, 0.5),
        5px -6px 0 1.5px rgba(192, 132, 252, 0.4);
    }

    .theme-card[data-theme="ocean"] .theme-preview {
      background: linear-gradient(135deg, #060d16, #0c1623);
      box-shadow: inset 0 0 0 1px rgba(34, 211, 238, 0.2);
    }
    .theme-card[data-theme="ocean"] .theme-preview::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40%;
      border-radius: 0 0 10px 10px;
      background: linear-gradient(180deg, transparent, rgba(34, 211, 238, 0.1));
    }

    .theme-card[data-theme="sakura"] .theme-preview {
      background: linear-gradient(135deg, #fdf6f8, #fff0f3);
      box-shadow: inset 0 0 0 1px rgba(244, 114, 182, 0.2);
    }
    .theme-card[data-theme="sakura"] .theme-preview::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background:
        radial-gradient(3px 3px at 30% 40%, rgba(244, 114, 182, 0.35), transparent),
        radial-gradient(2px 2px at 65% 55%, rgba(251, 207, 232, 0.4), transparent),
        radial-gradient(2px 2px at 45% 70%, rgba(244, 114, 182, 0.25), transparent);
    }

    /* 图片主题预览 */
    .theme-card[data-theme="handsome"] .theme-preview,
    .theme-card[data-theme="beauty"] .theme-preview,
    .theme-card[data-theme="cat"] .theme-preview {
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .theme-card[data-theme="handsome"] .theme-preview::after,
    .theme-card[data-theme="beauty"] .theme-preview::after,
    .theme-card[data-theme="cat"] .theme-preview::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(0,0,0,0.1));
    }

    /* "图片" 标签 */
    .theme-badge {
      display: inline-block;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 4px;
      background: rgba(120, 100, 255, 0.15);
      color: #a78bfa;
      font-weight: 600;
      letter-spacing: 0.3px;
      vertical-align: middle;
    }

    /* 底部信息 */
    .footer {
      padding: 10px 22px 14px;
      border-top: 1px solid rgba(255,255,255,0.04);
      text-align: center;
    }

    .footer-text {
      font-size: 10px;
      color: #4a4a60;
      letter-spacing: 0.3px;
    }

    .footer-text span {
      color: #7864ff;
    }

    .marketplace-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(120, 100, 255, 0.12), rgba(180, 92, 255, 0.08));
      border: 1px solid rgba(120, 100, 255, 0.2);
      color: #a78bfa;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .marketplace-btn:hover {
      background: linear-gradient(135deg, rgba(120, 100, 255, 0.2), rgba(180, 92, 255, 0.14));
      border-color: rgba(120, 100, 255, 0.35);
      transform: translateY(-1px);
    }

    .marketplace-btn svg {
      width: 13px;
      height: 13px;
    }

    /* 激活码输入区 */
    .license-section {
      padding: 12px 16px 4px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .license-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      color: #6a6a80;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .license-toggle:hover {
      background: rgba(255,255,255,0.05);
      color: #a8a8c0;
    }

    .license-input-row {
      display: none;
      gap: 6px;
      margin-top: 8px;
    }

    .license-input-row.show {
      display: flex;
    }

    .license-input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.2);
      color: #e8e8f0;
      font-size: 11px;
      font-family: 'SF Mono', 'Monaco', monospace;
      outline: none;
      transition: border-color 0.2s;
    }

    .license-input::placeholder {
      color: #4a4a60;
    }

    .license-input:focus {
      border-color: rgba(120, 100, 255, 0.4);
    }

    .license-submit {
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #7864ff, #b45cff);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      white-space: nowrap;
    }

    .license-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(120, 100, 255, 0.3);
    }

    .license-msg {
      font-size: 10px;
      margin-top: 6px;
      display: none;
    }

    .license-msg.show {
      display: block;
    }

    .license-msg.success {
      color: #4ade80;
    }

    .license-msg.error {
      color: #f87171;
    }

    .license-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(74, 222, 128, 0.12);
      color: #4ade80;
      font-weight: 600;
    }

    /* 切换动画 */
    .theme-card {
      animation: fadeSlideIn 0.3s ease both;
    }
    .theme-card:nth-child(1) { animation-delay: 0.02s; }
    .theme-card:nth-child(2) { animation-delay: 0.04s; }
    .theme-card:nth-child(3) { animation-delay: 0.06s; }
    .theme-card:nth-child(4) { animation-delay: 0.08s; }
    .theme-card:nth-child(5) { animation-delay: 0.10s; }
    .theme-card:nth-child(6) { animation-delay: 0.12s; }
    .theme-card:nth-child(7) { animation-delay: 0.14s; }
    .theme-card:nth-child(8) { animation-delay: 0.16s; }
    .theme-card:nth-child(9) { animation-delay: 0.18s; }
    .theme-card:nth-child(10) { animation-delay: 0.20s; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-row">
      <div class="logo">T</div>
      <div class="title">TRAE Work Skins</div>
    </div>
    <div class="subtitle">为你的工作台换一套皮肤</div>
  </div>

  <div class="theme-list" id="themeList">
    <!-- 主题卡片由 JS 动态生成 -->
  </div>

  <div class="footer">
    <button class="marketplace-btn" id="marketplaceBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h20v14H2z"/>
        <path d="M8 21h8"/>
        <path d="M12 17v4"/>
      </svg>
      主题市场
    </button>

    <div class="license-section">
      <div id="licenseStatus" style="display:none; text-align:center; padding:4px 0;">
        <span class="license-badge">
          <svg viewBox="0 0 12 12" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"><polyline points="2.5 6 5 8.5 9.5 3.5"/></svg>
          付费主题已解锁
        </span>
      </div>
      <button class="license-toggle" id="licenseToggle">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        输入激活码
      </button>
      <div class="license-input-row" id="licenseInputRow">
        <input type="text" class="license-input" id="licenseInput" placeholder="XXXX-XXXX" maxlength="25">
        <button class="license-submit" id="licenseSubmit">验证</button>
      </div>
      <div class="license-msg" id="licenseMsg"></div>
    </div>

    <div class="footer-text" style="margin-top:8px;">TRAE Work <span>Skins</span> v1.0 · 仅支持网页版</div>
  </div>

  <script src="../license.js"></script>
  <script src="popup.js"></script>
</body>
</html>
